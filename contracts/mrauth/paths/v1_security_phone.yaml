post:
  summary: Auth/SC/R2. Метод создания операции на установку/изменение телефона пользователя
  description: |-
    Метод предназначен для создания операции установки/изменения телефона текущего пользователя.

    ### Алгоритм установки/изменения телефона пользователя:
    1. `POST /v1/security/phone` (новый телефон) — отправляется код подтверждения на текущий емаил;
    2. Пользователь указывает полученный код и подтверждает операцию (`POST /v1/operation/confirm`);
    3. Если 2FA включена — пользователю предлагается ввести пароль или TOTP код (или одноразовый
      аварийный код) для подтверждения операции;
    4. Пользователь применяет подтверждённую операцию методом `POST /v1/security/apply-operation` —
      телефон устанавливается/изменяется на новый;
    5. На текущий емаил отправляется уведомление, что телефон был установлен/изменён;
  operationId: changeUserPhone
  tags:
    - Auth.Security
  x-auth-scopes:
    - any-users

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Security.Request.Model.ChangePhone.yaml"

  responses:
    "200":
      $ref: "../components/responses/Auth.ResponseJson.WaitingConfirmOperation.yaml"
    "400":
      # Новый телефон должен быть указан
      # Новый телефон некорректен или уже используется другим пользователем
      # Пользователь отправил слишком много SMS за короткое время с указанного телефона (countSmsSend <= 0);
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

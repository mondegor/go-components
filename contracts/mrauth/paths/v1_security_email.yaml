post:
  summary: Auth/SC/R1. Метод создания операции на изменение емаила пользователя
  description: |-
    Метод предназначен для создания операции изменения емаила текущего пользователя.

    ### Алгоритм изменения емаила пользователя:
    1. `POST /v1/security/email` (новый емаил) — отправляется код подтверждения на новый емаил;
    2. Пользователь указывает полученный код и подтверждает новый емаил (`POST /v1/operation/confirm`);
    3. Если 2FA включена — пользователю предлагается ввести пароль или TOTP код (или одноразовый
      аварийный код) для подтверждения операции;
    4. Пользователь применяет подтверждённую операцию методом `POST /v1/security/apply-operation`:\
      4.1. Если 2FA включена — емаил изменяется на новый, на старый емаил отправляется уведомление;\
      4.2. Если 2FA выключена — новый емаил ставится в лист ожидания и через 3 дня старый емаил
        изменяется на новый; на старый емаил отправляется уведомление со ссылкой блокировки аккаунта
        до выяснения обстоятельств (ссылка действует 14 дней);
  operationId: changeUserEmail
  tags:
    - Auth.Security
  x-auth-scopes:
    - any-users

#  parameters:
#    - $ref: "../_shared/components/parameters/Api.Request.Header.AcceptLanguage.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Header.CorrelationID.yaml"
#    - $ref: "../_shared/components/parameters/Api.Request.Query.Language.yaml"

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Security.Request.Model.ChangeEmail.yaml"

  responses:
    "200":
      $ref: "../components/responses/Auth.ResponseJson.WaitingConfirmOperation.yaml"
    "400":
      # Новый емаил должен быть указан
      # Новый емаил некорректен или уже используется другим пользователем
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

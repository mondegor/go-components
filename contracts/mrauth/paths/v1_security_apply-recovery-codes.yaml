post:
  summary: Auth/SC/R11. Метод применяет подтверждённую операцию перевыпуска и выдаёт новые аварийные коды
  description: |-
    Метод завершает перевыпуск аварийных кодов после подтверждения операции, созданной методом
    `POST /v1/security/recovery-codes`. Набор аварийных кодов заменяется на новый и единоразово
    возвращается (старые коды становятся недействительными, новые нужно сохранить — повторно
    они не показываются).
  operationId: applyUser2faRecoveryCodes
  tags:
    - Auth.Security
  x-auth-scopes:
    - any-users

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Security.Request.Model.ApplyByToken.yaml"
  responses:
    '200':
      description: Аварийные коды перевыпущены, возвращён новый набор
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Auth.Security.Response.RecoveryCodes.yaml"
    "400":
      # Токен операции должен быть указан
      # Токен операции некорректен или недействителен
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

post:
  summary: Auth/SC/R9. Метод применяет подтверждённую операцию смены пароля и выдаёт аварийные коды
  description: |-
    Метод завершает установку/смену пароля как 2FA после подтверждения операции, созданной
    методом `POST /v1/security/password`. При успехе 2FA по паролю включается (или пароль
    обновляется) и единоразово возвращается набор одноразовых аварийных кодов
    (их нужно сохранить — повторно они не показываются).
  operationId: applyUser2faPassword
  tags:
    - Auth.Security
  x-auth-scopes:
    - any-users

  requestBody:
    required: true
    content:
      application/json;charset=UTF-8:
        schema:
          $ref: "../components/models/Auth.Security.Request.Model.ApplyByToken.yaml"
  responses:
    '200':
      description: Пароль установлен как 2FA, возвращены аварийные коды
      content:
        application/json;charset=UTF-8:
          schema:
            $ref: "../components/models/Auth.Security.Response.RecoveryCodes.yaml"
    "400":
      # Токен операции должен быть указан
      # Токен операции некорректен или недействителен
      $ref: "../_shared/components/responses/Api.ResponseJson.Error400.yaml"
    "401":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error401.yaml"
    "403":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error403.yaml"
    "500":
      $ref: "../_shared/components/responses/Api.ResponseJson.Error5xx.yaml"

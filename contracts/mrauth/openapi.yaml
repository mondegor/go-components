---
openapi: 3.0.3
info:
  version: LATEST
  title: Auth API
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  description: |-
    Auth REST API
    - При создании нового аккаунта, пользователь, в качестве логина должен указать свой емаил, на который будет отправлен код, для подтверждения емаила и активации аккаунта;
    - Для последующего входа пользователем в систему, ему нужно указать свой емаил/телефон и далее ввести код подтверждения отправленный на его емаил. При включенной 2FA ему дополнительно нужно будет ввести пароль/TOTP код от своей учётной записи;
    - Авторизованный пользователь может:
      - включить 2FA аутентификацию, выбрав один из способов дополнительной проверки: по паролю или по TOTP коду;
      - отключить 2FA аутентификацию введя пароль/TOTP код (или одноразовый аварийный код выданный при включении 2FA-TOTP аутентификации);
      - изменять свои емаил/телефон с их обязательным подтверждением;
      - следить за всеми своими открытыми сессиями и закрыть любую из них при необходимости;
      - осуществлять особые операции требующие дополнительного подтверждения по емаилу/телефону или 2FA методами;

    ### Общие параметры запросов
    Перечисленные ниже параметры необязательны и принимаются **всеми методами** API (поэтому у каждого метода отдельно не дублируются):
    - `Accept-Language` (заголовок) / `lang` (query-параметр) — предпочтительный язык пользователя;
    - `X-Correlation-Id` (заголовок) — уникальный идентификатор клиента для сквозной трассировки запроса.

    Приоритет применения языка описан ниже в разделе «Локализация и время».

    ### Локализация и время
    - Все сущностные даты/время в ответах отдаются в **часовом поясе пользователя** в формате RFC3339 со смещением (например `2020-01-01T15:00:00+03:00`);
    - Текстовые сообщения (`message`) и уведомления отдаются на **языке пользователя**;
    - **Часовой пояс** берётся из access-токена, в котором он фиксируется на момент выпуска токена, и на конкретный запрос не переопределяется. Задать его можно при регистрации (`POST /v1/signup`) и изменить позже (`POST /v1/user/settings`); для гостевых запросов применяется `UTC`;
    - Изменённые через `POST /v1/user/settings` язык и часовой пояс применяются к ответам **только после перевыпуска access-токена** — до этого сервер продолжает отвечать в прежнем языке и поясе. Поля `lang` и `tz` в `GET /v1/user` читаются из профиля, то есть отдают уже новые значения, поэтому в этом окне они могут не совпадать с языком и поясом, применёнными к тому же ответу;
    - **Язык** определяется по приоритету:
      1. query-параметр запроса — `lang` (например `ru-RU`) — наивысший приоритет, разовое переопределение на конкретный запрос;
      2. access-токен — для **авторизованных** запросов сервер подставляет язык, зафиксированный в токене на момент его выпуска, вместо клиентского заголовка `Accept-Language` (клиентское значение при этом игнорируется); для гостевых запросов используется значение заголовка;
      3. значение по умолчанию — язык системы;
    - Невалидное значение источника языка пропускается — применяется следующий по приоритету;
    - Время **возникновения ошибки** (`time` в объектах ошибок) — это системное время и всегда отдаётся в **UTC**, независимо от часового пояса пользователя.

    ### Пользовательские ограничения полей и ошибки

    #### Ограничения полей
    - required - поле обязательно для заполнения;
    - omitempty - поле может не указываться (будет игнорироваться при обновлении записи целиком);
    - unique - уникальное значение поля;
    - min=N - поле должно быть не менее N символов;
    - max=N - поле должно быть не более N символов;
    - gte=N - числовое поле должно быть равно или более N;
    - lte=N - числовое поле должно быть равно или менее N;
    - enum - поле должно содержать одно из ENUM значений;
    - UUID - поле формата UUID;
    - pattern=P - поле должно соответствовать регулярному выражению P;

    #### Ошибки
    - ErrVersionInvalid - если передаваемая версия объекта не совпала с текущей версией объекта.\
      Как правило, это означает, что объект был ранее изменён другим процессом;
    - ErrSwitchStatusRejected - перевод в указанный статус объекта отклонён.\
      WorkFlow объекта запрещает переключение в указанный статус;
servers:
  - url: http://api.sample.local/auth
    description: Local Domain
  - url: http://localhost:8080/auth
    description: Local Host
security:
  - bearerAuth: []
tags:
  - name: Auth
    description: Auth API
  - name: Auth.Check
    description: Auth API Helps to check user data
  - name: Auth.Operation
    description: Auth API Confirmation operations
  - name: Auth.Security
    description: Auth API User security methods change protected user properties
  - name: Auth.Sessions
    description: Auth API User Sessions
paths:

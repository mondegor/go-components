    $ref: "./paths/v1_signup.yaml"
  /v1/signin:
    $ref: "./paths/v1_signin.yaml"
  /v1/session:
    $ref: "./paths/v1_session.yaml"
  /v1/user:
    $ref: "./paths/v1_user.yaml"
  /v1/user/settings:
    $ref: "./paths/v1_user_settings.yaml"

  /v1/check/check-login:
    $ref: "./paths/v1_check_check-login.yaml"
  /v1/check/calc-password-strength:
    $ref: "./paths/v1_check_calc-password-strength.yaml"
  /v1/check/generate-password:
    $ref: "./paths/v1_check_generate-password.yaml"
  /.well-known/jwks.json:
    $ref: "./paths/well-known_jwks.yaml"

  /v1/operation/confirm:
    $ref: "./paths/v1_operation_confirm.yaml"
  /v1/operation/resend:
    $ref: "./paths/v1_operation_resend.yaml"
  /v1/operation/revoke:
    $ref: "./paths/v1_operation_revoke.yaml"

  /v1/security/email:
    $ref: "./paths/v1_security_email.yaml"
  /v1/security/phone:
    $ref: "./paths/v1_security_phone.yaml"
  /v1/security/password:
    $ref: "./paths/v1_security_password.yaml"
  /v1/security/apply-password:
    $ref: "./paths/v1_security_apply-password.yaml"
  /v1/security/apply-operation:
    $ref: "./paths/v1_security_apply-operation.yaml"
  /v1/security/totp:
    $ref: "./paths/v1_security_totp.yaml"
  /v1/security/totp/{token}:
    $ref: "./paths/v1_security_totp_token.yaml"
  /v1/security/apply-totp:
    $ref: "./paths/v1_security_apply-totp.yaml"
  /v1/security/recovery-codes:
    $ref: "./paths/v1_security_recovery-codes.yaml"
  /v1/security/apply-recovery-codes:
    $ref: "./paths/v1_security_apply-recovery-codes.yaml"
  /v1/security/disable2fa:
    $ref: "./paths/v1_security_disable2fa.yaml"

  /v1/sessions:
    $ref: "./paths/v1_sessions.yaml"
  /v1/sessions/close:
    $ref: "./paths/v1_sessions_close.yaml"
components:
  securitySchemes:
    bearerAuth:
      description: https://www.rfc-editor.org/rfc/rfc6750
      type: http
      scheme: bearer
      bearerFormat: JWT

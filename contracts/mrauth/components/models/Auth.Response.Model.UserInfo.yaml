type: object
required:
  - email
  - lang
  - auth_2fa_type
  - realms
  - status
properties:
  email:
    type: string
    format: email
    maxLength: 64
    example: "user-email@example.com"
  phone:
    type: string
    format: phone
    maxLength: 32
    example: "+7 999 888 77 66"
  lang:
    type: string
    maxLength: 5
    example: "ru-RU"
  auth_2fa_type:
    $ref: "../enums/Auth.Enum.UserAuth2fa.yaml"
  realms:
    type: array
    items:
      $ref: "./Auth.Response.Model.UserRealm.yaml"
  status:
    $ref: "../enums/Auth.Enum.UserStatus.yaml"

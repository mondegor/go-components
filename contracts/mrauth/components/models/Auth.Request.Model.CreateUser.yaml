type: object
required:
  - realm
  - user_email
properties:
  realm:
    description: Область, пространство, где должен быть зарегистрирован пользователь
    type: string
    maxLength: 32
    example: "domain_name/user_group"
  user_email:
    description: Eмаил, который будет использован в качестве логина при создании пользователя
    type: string
    format: email
    minLength: 7
    maxLength: 64
    example: "user-email@example.com"
  tz:
    description: |-
      Часовой пояс пользователя (IANA-имя). Необязателен:
      - пустая строка равнозначна отсутствию поля, поэтому минимальная длина не задана;
        непустое значение короче 3 символов IANA-именем не является и отвергается
      - значение "Local" не допускается, т.к. IANA-именем не является
      - если имя не указано или приложению неизвестно, пояс подбирается
        по полям tz_offset и tz_dst; UTC сохраняется, только если подобрать
        пояс не удалось; сохранённый пояс доступен в поле tz информации
        о пользователе (GET /v1/user)
    type: string
    maxLength: 64
    # pattern: "^[A-Za-z][A-Za-z0-9+_-]*(/[A-Za-z0-9+_.-]+){0,2}$"
    example: "Europe/Moscow"
  tz_offset:
    description: |-
      Смещение часового пояса относительно UTC в секундах на момент запроса
      (диапазон соответствует существующим поясам: -12:00..+14:00)
    type: integer
    format: int32
    minimum: -43200
    maximum: 50400
    example: 10800
  tz_dst:
    description: Признак того, что в часовом поясе на момент запроса действует летнее время
    type: boolean
    default: false
    example: false

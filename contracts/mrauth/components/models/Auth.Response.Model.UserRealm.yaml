type: object
required:
  - name
  - user_kind
  - created_at
  - updated_at
properties:
  name:
    type: string
    maxLength: 32
    example: "domain_name/user_group"
  user_kind:
    type: string
    maxLength: 16
    example: "standard"
  last_location:
    description: Местоположение последнего входа или IP
    type: string
    example: "Saint-Petersburg, RU"
  last_logged_at:
    $ref: "../fields/Auth.Field.DateTimeLastLoggedAt.yaml"
  created_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeCreatedAt.yaml"
  updated_at:
    $ref: "../../_shared/components/fields/Api.Field.DateTimeUpdatedAt.yaml"

type: object
required:
  - lang
  - tz
properties:
  lang:
    description: |-
      Язык (локаль) пользователя: код языка и необязательный код региона
      - канонический вид не требуется: регистр и разделитель произвольны ("ru_RU", "en-us"),
        значение приводится к единому виду на сервере, и в ответе возвращается применённый язык
      - если язык приложению неизвестен, подбирается ближайший доступный,
        а при отсутствии подходящего применяется язык по умолчанию
    type: string
    minLength: 2
    maxLength: 5
    # pattern: "^[a-zA-Z]{2,3}([-_][a-zA-Z]{2})?$"
    example: "ru-RU"
  tz:
    description: |-
      Часовой пояс пользователя (IANA-имя)
      - pattern: "^[A-Za-z][A-Za-z0-9+_-]*(/[A-Za-z0-9+_.-]+){0,2}$"
      - значение "Local" не допускается, т.к. IANA-именем не является
      - если пояс приложению неизвестен, он не отвергается, а подбирается
        по полям tz_offset и tz_dst; применённый пояс возвращается в ответе
    type: string
    minLength: 3
    maxLength: 64
    # pattern: "^[A-Za-z][A-Za-z0-9+_-]*(/[A-Za-z0-9+_.-]+){0,2}$"
    example: "Europe/Moscow"
  tz_offset:
    description: |-
      Смещение часового пояса относительно UTC в секундах на момент запроса
      (диапазон соответствует существующим поясам: -12:00..+14:00)
    type: integer
    format: int32
    minimum: -43200
    maximum: 50400
    example: 10800
  tz_dst:
    description: Признак того, что в часовом поясе на момент запроса действует летнее время
    type: boolean
    default: false
    example: false

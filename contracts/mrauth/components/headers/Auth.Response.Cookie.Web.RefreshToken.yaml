schema:
  description: |-
    Используется платформой WEB. Кука с refreshToken.
    Атрибуты по умолчанию: Path=/, Secure, HttpOnly, SameSite=Strict, Max-Age=15552000 (180 дней).
    Domain задаётся host-приложением обязательно. Secure/SameSite настраиваемы (Secure=true,
    SameSite=Strict по умолчанию; SameSite=None требует Secure=true). HttpOnly всегда включён.
  type: string
  example: RTID=02fb5463db25b91568a1801dc0974b1d50cb1f3bc817f2be3a4b357929cee704; Path=/; Domain=example.com; Max-Age=15552000; HttpOnly; Secure; SameSite=Strict

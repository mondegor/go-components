description: |-
  Язык пользователя (BCP 47, напр. ru-RU), на нём отдаются текстовые сообщения и уведомления.
  Приоритет применения языка:
    1. query-параметр lang (этот параметр) — наивысший приоритет, разовое переопределение на запрос;
    2. заголовок Accept-Language (список с весами q); для авторизованных запросов сервер подставляет
       язык из действующего access токена вместо клиентского заголовка;
    3. язык системы по умолчанию.
  Значение сопоставляется с набором поддерживаемых языков (выбирается ближайший, напр. fr-CH → fr);
  невалидный/неподдерживаемый источник пропускается — применяется следующий по приоритету.
name: lang
in: query
required: false
schema:
  type: string
  maxLength: 5
example: "ru-RU"
